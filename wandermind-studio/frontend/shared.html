<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>WanderMind · Shared Trip</title>
  <meta name="description" content="A read-only WanderMind trip plan shared with you.">
  <link rel="icon" type="image/png" href="assets/images/logo-mark.png">
  <meta property="og:title" content="WanderMind Trip Plan">
  <meta property="og:description" content="Curated by 6 AI travel agents — check out this trip plan.">
  <meta property="og:type" content="article">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    :root {
      --gold: #fcbf1e;
      --gold-dk: #d97706;
      --teal: #0e7c6b;
      --teal-lt: #14b8a6;
      --ink: #1e293b;
      --ink-2: #475569;
      --ink-3: #94a3b8;
      --paper: #ffffff;
      --bg: #fafaf7;
      --bg-2: #f5f3ed;
      --line: #e5e2d8;
      --shadow: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,.10);
    }
    body.dark {
      --ink: #f0f0ec;
      --ink-2: #b8b8b0;
      --ink-3: #707068;
      --paper: #1f1f1c;
      --bg: #15150f;
      --bg-2: #2a2a25;
      --line: #3a3a32;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-lg: 0 10px 30px rgba(0,0,0,.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* —— Top bar —— */
    .sh-top {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .sh-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--ink);
      font-size: 17px;
      letter-spacing: .02em;
    }
    .sh-brand img { width: 32px; height: 32px; object-fit: contain; }
    .sh-brand small { font-size: 10px; opacity: .55; letter-spacing: .18em; text-transform: uppercase; font-weight: 400; }
    .sh-cta {
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #fff;
      padding: 9px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      white-space: nowrap;
    }
    .sh-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(252,191,30,.4); text-decoration: none; color: #fff; }

    /* —— Hero —— */
    .sh-hero {
      max-width: 760px;
      margin: 30px auto 0;
      padding: 0 24px;
    }
    .sh-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-dk);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sh-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.25;
      margin: 0 0 14px;
      letter-spacing: -.01em;
    }
    .sh-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .sh-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--bg-2);
      border-radius: 14px;
      font-size: 12.5px;
      color: var(--ink-2);
      border: 1px solid var(--line);
    }
    .sh-chip .fa { color: var(--gold-dk); font-size: 11px; }
    .sh-meta {
      font-size: 13px;
      color: var(--ink-3);
      padding: 8px 0 22px;
      border-bottom: 1px dashed var(--line);
    }
    .sh-meta .fa { margin-right: 4px; opacity: .7; }

    /* —— Messages —— */
    .sh-feed {
      max-width: 760px;
      margin: 0 auto 60px;
      padding: 24px;
    }
    .sh-msg {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
    }
    .sh-msg-user {
      flex-direction: row-reverse;
    }
    .sh-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      box-shadow: var(--shadow);
    }
    .sh-avatar.user { background: linear-gradient(135deg, #fcbf1e, #d97706); }
    .sh-avatar.planner  { background: linear-gradient(135deg, #14b8a6, #0e7c6b); }
    .sh-avatar.hotel    { background: linear-gradient(135deg, #60a5fa, #2563eb); }
    .sh-avatar.food     { background: linear-gradient(135deg, #fb923c, #ea580c); }
    .sh-avatar.activity { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .sh-avatar.budget   { background: linear-gradient(135deg, #fcbf1e, #d97706); }
    .sh-avatar.search   { background: linear-gradient(135deg, #34d399, #059669); }
    .sh-bubble-wrap {
      max-width: calc(100% - 56px);
      min-width: 0;
    }
    .sh-agent-name {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--ink-3);
      letter-spacing: .04em;
      margin-bottom: 5px;
    }
    .sh-bubble {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--ink);
      box-shadow: var(--shadow);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .sh-msg-user .sh-bubble {
      background: linear-gradient(135deg, rgba(252,191,30,.18), rgba(252,191,30,.06));
      border-color: rgba(252,191,30,.3);
    }
    .sh-bubble p { margin: 0 0 10px; }
    .sh-bubble p:last-child { margin-bottom: 0; }
    .sh-bubble h1, .sh-bubble h2, .sh-bubble h3 {
      font-size: 15px;
      font-weight: 700;
      margin: 12px 0 6px;
      color: var(--ink);
    }
    .sh-bubble ul, .sh-bubble ol { padding-left: 24px; margin: 6px 0 10px; }
    .sh-bubble li { margin-bottom: 4px; }
    .sh-bubble code {
      background: var(--bg-2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12.5px;
    }
    .sh-bubble strong { color: var(--ink); font-weight: 700; }

    /* —— Footer CTA —— */
    .sh-footer-cta {
      max-width: 760px;
      margin: 40px auto;
      padding: 28px 24px;
      background: linear-gradient(135deg, rgba(252,191,30,.12), rgba(14,124,107,.08));
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(252,191,30,.25);
    }
    .sh-footer-cta h3 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .sh-footer-cta p {
      color: var(--ink-2);
      margin: 0 0 18px;
      font-size: 14px;
    }
    .sh-footer-cta .sh-cta {
      padding: 12px 28px;
      font-size: 14px;
      display: inline-block;
    }

    /* —— Loading / error states —— */
    .sh-state {
      max-width: 560px;
      margin: 80px auto;
      padding: 0 24px;
      text-align: center;
    }
    .sh-state .fa-spinner { animation: spin 1s linear infinite; color: var(--gold); font-size: 36px; }
    .sh-state .fa-frown-o, .sh-state .fa-exclamation-triangle {
      color: var(--ink-3); font-size: 48px;
    }
    .sh-state h2 { font-size: 22px; margin: 20px 0 8px; color: var(--ink); }
    .sh-state p { color: var(--ink-2); margin: 0 0 22px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* —— Theme toggle —— */
    .sh-theme-toggle {
      background: var(--bg-2);
      border: 1px solid var(--line);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      color: var(--ink-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    .sh-theme-toggle:hover { background: var(--line); }

    /* —— Fusion CTA card —— */
    .sh-fuse-cta {
      max-width: 760px;
      margin: 28px auto 0;
      padding: 26px 28px;
      background: linear-gradient(135deg, rgba(14,124,107,.12), rgba(252,191,30,.10));
      border-radius: 18px;
      border: 1px solid rgba(14,124,107,.25);
    }
    .sh-fuse-cta h3 {
      font-size: 19px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .sh-fuse-cta p {
      color: var(--ink-2);
      margin: 0 0 16px;
      font-size: 13.5px;
      line-height: 1.65;
    }
    .sh-fuse-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--teal-lt), var(--teal));
      color: #fff;
      padding: 11px 24px;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: transform .15s, box-shadow .2s;
    }
    .sh-fuse-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(14,124,107,.32);
    }

    /* —— Modal overlay (used for fusion form + result) —— */
    .sh-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,15,.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .sh-modal-overlay.show { display: flex; }
    .sh-modal {
      background: var(--paper);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 18px;
      box-shadow: 0 30px 60px rgba(0,0,0,.30);
    }
    .sh-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--line);
    }
    .sh-modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .sh-modal-title .fa { color: var(--teal); }
    .sh-modal-close {
      width: 32px;
      height: 32px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      cursor: pointer;
      color: var(--ink-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .sh-modal-close:hover { background: var(--line); }
    .sh-modal-body { padding: 22px 24px 24px; }
    .sh-modal-body p.sh-modal-sub {
      color: var(--ink-2);
      font-size: 13.5px;
      line-height: 1.65;
      margin: 0 0 18px;
    }

    /* —— Fusion form —— */
    .sh-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .sh-form-field { display: block; }
    .sh-form-field.full { grid-column: 1 / -1; }
    .sh-form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 5px;
    }
    .sh-form-input, .sh-form-select, .sh-form-textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 9px;
      font-size: 13.5px;
      color: var(--ink);
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .sh-form-input:focus, .sh-form-select:focus, .sh-form-textarea:focus {
      border-color: var(--teal-lt);
    }
    .sh-form-textarea { resize: vertical; min-height: 60px; }
    .sh-form-msg {
      font-size: 13px;
      margin: 6px 0 12px;
      min-height: 16px;
      color: #dc2626;
    }
    .sh-form-msg.ok { color: var(--teal); }
    .sh-form-submit {
      width: 100%;
      padding: 13px 18px;
      margin-top: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .15s, box-shadow .2s;
    }
    .sh-form-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(252,191,30,.35); }
    .sh-form-submit:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    /* —— Fusion result —— */
    .sh-fusion-result {
      max-width: 760px;
      margin: 0 auto;
      padding: 26px 28px;
      background: var(--paper);
      border: 2px solid rgba(14,124,107,.28);
      border-radius: 18px;
      margin-top: 28px;
      box-shadow: 0 12px 38px rgba(14,124,107,.08);
    }
    .sh-fusion-result h2 {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 6px;
      color: var(--ink);
      line-height: 1.35;
    }
    .sh-fusion-meta {
      font-size: 12.5px;
      color: var(--ink-3);
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px dashed var(--line);
    }
    .sh-fusion-body {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--ink);
    }
    .sh-fusion-body p { margin: 0 0 12px; }
    .sh-fusion-body strong { font-weight: 700; color: var(--ink); }
    .sh-fusion-body ul, .sh-fusion-body ol { padding-left: 22px; margin: 6px 0 14px; }
    .sh-fusion-body li { margin-bottom: 4px; }
    .sh-fusion-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .sh-fusion-actions button,
    .sh-fusion-actions a {
      flex: 1 1 180px;
      padding: 11px 16px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: var(--bg-2);
      color: var(--ink);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      text-decoration: none;
      transition: background .2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .sh-fusion-actions .primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #fff;
      border-color: transparent;
    }
    .sh-fusion-actions button:hover,
    .sh-fusion-actions a:hover { background: var(--line); }
    .sh-fusion-actions .primary:hover { background: linear-gradient(135deg, var(--gold-dk), var(--gold-dk)); }
    .sh-fusion-actions .copied {
      background: linear-gradient(135deg, var(--teal-lt), var(--teal)) !important;
      color: #fff !important;
      border-color: transparent !important;
    }

    /* —— Loading state inside modal —— */
    .sh-fuse-loading {
      text-align: center;
      padding: 36px 12px;
      color: var(--ink-2);
    }
    .sh-fuse-loading .fa-spinner {
      font-size: 32px;
      color: var(--gold);
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    /* —— Mobile —— */
    @media (max-width: 575px) {
      .sh-top { padding: 12px 16px; }
      .sh-brand { font-size: 15px; }
      .sh-brand small { display: none; }
      .sh-cta { padding: 8px 14px; font-size: 12px; }
      .sh-hero { padding: 0 16px; margin-top: 20px; }
      .sh-title { font-size: 24px; }
      .sh-feed { padding: 18px 16px; }
      .sh-avatar { width: 32px; height: 32px; font-size: 14px; }
      .sh-bubble-wrap { max-width: calc(100% - 48px); }
      .sh-bubble { font-size: 14px; padding: 12px 14px; }
      .sh-footer-cta { margin: 30px 16px; padding: 22px 18px; }
      .sh-footer-cta h3 { font-size: 18px; }
      .sh-fuse-cta { margin: 22px 16px 0; padding: 20px 18px; border-radius: 14px; }
      .sh-fuse-cta h3 { font-size: 17px; }
      .sh-form-grid { grid-template-columns: 1fr; gap: 10px; }
      .sh-modal { max-height: 92vh; }
      .sh-modal-head { padding: 16px 18px 12px; }
      .sh-modal-body { padding: 18px 18px 20px; }
      .sh-fusion-result { margin: 22px 16px 0; padding: 22px 20px; border-radius: 14px; }
      .sh-fusion-actions { flex-direction: column; }
      .sh-fusion-actions button, .sh-fusion-actions a { flex: 1; }
    }
  </style>
</head>
<body>

  <header class="sh-top">
    <a href="/" class="sh-brand">
      <img src="assets/images/logo-mark.png" alt="WanderMind">
      <span>WanderMind <small>STUDIO</small></span>
    </a>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="sh-theme-toggle" id="sh-theme" title="Toggle theme"><span class="fa fa-moon-o"></span></button>
      <a href="/ai-tool" class="sh-cta" id="sh-cta-top">Plan my own</a>
    </div>
  </header>

  <main id="sh-main">
    <div class="sh-state" id="sh-loading">
      <span class="fa fa-spinner"></span>
      <p style="margin-top:18px">Loading shared trip…</p>
    </div>
  </main>

  <!-- Fusion form modal (built lazily by JS) -->
  <div class="sh-modal-overlay" id="sh-fuse-modal"></div>

    /* ---------- Helpers ---------- */
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function interp(s, vars) {
      return s.replace(/\{(\w+)\}/g, (_, k) => vars[k] != null ? vars[k] : '');
    }
    function fmtDate(ts) {
      try {
        const d = new Date(ts * 1000);
        return d.toLocaleDateString(LANG === 'zh' ? 'zh-CN' : LANG, { year:'numeric', month:'short', day:'numeric' });
      } catch (_) { return ''; }
    }

    /* Light markdown → HTML (paragraphs / bold / italic / lists / headings / code) */
    function renderMd(text) {
      if (!text) return '';
      let s = escapeHtml(text);
      s = s.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c}</code></pre>`);
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/^###\s+(.*)$/gm, '<h3>$1</h3>');
      s = s.replace(/^##\s+(.*)$/gm, '<h2>$1</h2>');
      s = s.replace(/^#\s+(.*)$/gm, '<h1>$1</h1>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // simple list grouping
      const lines = s.split(/\n/);
      const out = []; let inUl = false, inOl = false;
      for (const ln of lines) {
        const ul = ln.match(/^[\-\*]\s+(.*)$/);
        const ol = ln.match(/^\d+\.\s+(.*)$/);
        if (ul) {
          if (!inUl) { if (inOl) { out.push('</ol>'); inOl=false; } out.push('<ul>'); inUl=true; }
          out.push('<li>' + ul[1] + '</li>');
        } else if (ol) {
          if (!inOl) { if (inUl) { out.push('</ul>'); inUl=false; } out.push('<ol>'); inOl=true; }
          out.push('<li>' + ol[1] + '</li>');
        } else {
          if (inUl) { out.push('</ul>'); inUl=false; }
          if (inOl) { out.push('</ol>'); inOl=false; }
          if (ln.trim()) out.push('<p>' + ln + '</p>');
        }
      }
      if (inUl) out.push('</ul>');
      if (inOl) out.push('</ol>');
      return out.join('\n');
    }

    const AGENT_ICONS = {

    /* ---------- Load shared trip ---------- */
    async function loadShared() {

      const token = params.get('t') || params.get('token');
      const main = document.getElementById('sh-main');
      if (!token) {
        main.innerHTML = renderErr();
        return;
      }
      try {
        const r = await fetch('/api/share/' + encodeURIComponent(token));
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        render(data);
      } catch (_) {
        main.innerHTML = renderErr();
      }

    function render(data) {
      const main = document.getElementById('sh-main');
      const title = data.title || 'Untitled trip';
      const meta = data.trip_meta || {};
      const owner = data.owner_name || '';
      const dest = data.dest || '';

      const chips = [];
      if (meta.start) chips.push({ icon:'fa-calendar', text: meta.start });
      if (meta.days)  chips.push({ icon:'fa-clock-o', text: meta.days + (LANG==='zh'?' 天': LANG==='ja'?'日': LANG==='ko'?'일': LANG==='id'?' hari':' days') });
      if (meta.people) chips.push({ icon:'fa-users', text: meta.people + (LANG==='zh'?' 人':LANG==='ja'?'人':LANG==='ko'?'명':LANG==='id'?' orang':' people') });
      if (meta.budget) chips.push({ icon:'fa-dollar', text: Number(meta.budget).toLocaleString() });
      if (dest) chips.push({ icon:'fa-map-marker', text: dest });

      const heroHtml = `
        <section class="sh-hero">
          <div class="sh-eyebrow"><span class="fa fa-share-alt"></span> ${escapeHtml(T.hero)}</div>
          <h1 class="sh-title">${escapeHtml(title)}</h1>
          ${chips.length ? `<div class="sh-chips">${chips.map(c => `<span class="sh-chip"><span class="fa ${c.icon}"></span>${escapeHtml(c.text)}</span>`).join('')}</div>` : ''}
          <div class="sh-meta">
            ${owner ? `<span><span class="fa fa-user-circle-o"></span>${interp(T.sharedBy, {name: escapeHtml(owner)})}</span> · ` : ''}
            <span><span class="fa fa-eye"></span>${interp(T.views, {n: data.views || 1})}</span>
            ${data.created_at ? ` · <span><span class="fa fa-calendar"></span>${interp(T.created, {date: fmtDate(data.created_at)})}</span>` : ''}
          </div>
        </section>
      `;

      const msgs = data.messages || [];
      const feedHtml = `
        <section class="sh-feed">
          ${msgs.map(m => renderMsg(m)).join('')}
        </section>
      `;

      // Fusion CTA — the headline differentiator: "plan together"
      const fuseCtaHtml = `
        <section class="sh-fuse-cta">
          <h3>${escapeHtml(T.fuseTitle)}</h3>
          <p>${escapeHtml(T.fuseSub)}</p>
          <button class="sh-fuse-btn" id="sh-open-fuse">${escapeHtml(T.fuseBtn)}</button>
        </section>
      `;

      // Anchor for the fusion result so we can scroll to it after success
      const fuseResultAnchor = `<div id="sh-fusion-anchor"></div>`;

      const ctaHtml = `
        <section class="sh-footer-cta">
          <h3>${escapeHtml(T.hero)}</h3>
          <p>WanderMind · ${LANG==='zh'?'6 位 AI 智能体为你的旅行护航':'6 AI agents at your service'}</p>
          <a href="/ai-tool" class="sh-cta">${escapeHtml(T.cta)}</a>

      // Wire the fusion CTA → opens the form modal
      const fuseBtn = document.getElementById('sh-open-fuse');
      if (fuseBtn) fuseBtn.onclick = () => openFuseForm();

      // Update document title
      document.title = title + ' · WanderMind';

      // Stash source data so the form / fusion result can reference it
      window._shSource = { token: data.token, title, owner_name: owner };
    }

    function renderMsg(m) {
      const isUser = m.role === 'user';
      const agentKey = m.agent || 'planner';
      const agentLabel = isUser ? T.user : (T[agentKey] || T.assistant);
      const avatarCls = isUser ? 'user' : agentKey;
      const icon = isUser ? 'fa-user' : (AGENT_ICONS[agentKey] || 'fa-comment-o');

          </div>

      `;
    }

    /* ─────────────── Fusion form modal ─────────────── */
    function _optionsHtml(opts) {
      return opts.map(([val, label]) =>
        `<option value="${escapeHtml(val)}">${escapeHtml(label)}</option>`).join('');

    function openFuseForm() {
      const overlay = document.getElementById('sh-fuse-modal');
      overlay.innerHTML = `

    function closeFuseModal() {
      const overlay = document.getElementById('sh-fuse-modal');
      overlay.classList.remove('show');

    async function submitFusion() {
      const name = document.getElementById('sh-fp-name').value.trim();
      const msg  = document.getElementById('sh-fp-msg');
      const btn  = document.getElementById('sh-fp-submit');
      msg.classList.remove('ok');
      msg.textContent = '';
      if (!name) { msg.textContent = T.fuseNameRequired; return; }

      const prefs = {
        budget:    document.getElementById('sh-fp-budget').value || null,
        pace:      document.getElementById('sh-fp-pace').value || null,
        style:     document.getElementById('sh-fp-style').value || null,
        food:      document.getElementById('sh-fp-food').value || null,
        must_have: document.getElementById('sh-fp-must').value.trim() || null,
        avoid:     document.getElementById('sh-fp-avoid').value.trim() || null,
        free_text: document.getElementById('sh-fp-free').value.trim() || null,
      };

      // Show loading state inside the modal
      const overlay = document.getElementById('sh-fuse-modal');
      overlay.querySelector('.sh-modal-body').innerHTML = `
        <div class="sh-fuse-loading">
          <div><span class="fa fa-spinner"></span></div>
          <div style="margin-top:8px">${escapeHtml(T.fuseGenerating)}</div>
        </div>
      `;

      const sourceToken = (window._shSource && window._shSource.token) ||
                          new URLSearchParams(location.search).get('t');

      try {
        const r = await fetch('/api/share/' + encodeURIComponent(sourceToken) + '/fuse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ guest_name: name, guest_prefs: prefs, lang: LANG })
        });
        if (!r.ok) {
          const ed = await r.json().catch(() => ({}));
          throw new Error(ed.detail || ('HTTP ' + r.status));
        }
        const data = await r.json();
        closeFuseModal();
        renderFusionResult({
          owner_name: data.owner_name,
          guest_name: data.guest_name,
          ai_response: data.ai_response,
          token: data.token,
          url: data.url
        });
      } catch (e) {
        // Restore form on error
        openFuseForm();
        document.getElementById('sh-fp-name').value = name;
        document.getElementById('sh-fp-budget').value = prefs.budget || '';
        document.getElementById('sh-fp-pace').value = prefs.pace || '';
        document.getElementById('sh-fp-style').value = prefs.style || '';
        document.getElementById('sh-fp-food').value = prefs.food || '';
        document.getElementById('sh-fp-must').value = prefs.must_have || '';
        document.getElementById('sh-fp-avoid').value = prefs.avoid || '';
        document.getElementById('sh-fp-free').value = prefs.free_text || '';
        const m = document.getElementById('sh-fp-msg');
        if (m) m.textContent = (e && e.message) || T.fuseErr;
      }
    }

    function renderFusionResult({ owner_name, guest_name, ai_response, token, url }) {
      const anchor = document.getElementById('sh-fusion-anchor');
      const fullUrl = window.location.origin + (url || ('/fusion?t=' + token));
      const ownerSafe = escapeHtml(owner_name || T.assistant);
      const guestSafe = escapeHtml(guest_name || T.user);
      const title = (T.fuseResultTitle || '').replace('{a}', ownerSafe).replace('{b}', guestSafe);
      const html = `
        <section class="sh-fusion-result" id="sh-fusion-card">
          <h2>${title}</h2>
          <div class="sh-fusion-meta">
            <span class="fa fa-users"></span> ${escapeHtml(owner_name || '')} &times; ${escapeHtml(guest_name || '')}
          </div>
          <div class="sh-fusion-body">${renderMd(ai_response || '')}</div>
          <div class="sh-fusion-actions">
            <button class="primary" id="sh-fusion-copy" data-url="${escapeHtml(fullUrl)}">
              <span class="fa fa-link"></span> ${escapeHtml(T.fuseShareBtn)}
            </button>
            <a href="/shared?t=${escapeHtml((window._shSource && window._shSource.token) || '')}">
              <span class="fa fa-arrow-left"></span> ${escapeHtml(T.fuseBackToOriginal)}
            </a>
            <a href="/ai-tool" class="">
              <span class="fa fa-magic"></span> ${escapeHtml(T.cta)}
            </a>
          </div>
        </section>
      `;
      if (anchor) {
        anchor.innerHTML = html;
        // Push the new fusion URL to history so refresh / share works
        if (token) {
          history.replaceState(null, '', '/fusion?t=' + token);
        }
        const copyBtn = document.getElementById('sh-fusion-copy');
        copyBtn.onclick = async () => {
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(fullUrl);
            } else {
              const ta = document.createElement('textarea');
              ta.value = fullUrl;
              ta.style.position = 'fixed'; ta.style.left = '-9999px';
              document.body.appendChild(ta); ta.select(); document.execCommand('copy');
              document.body.removeChild(ta);
            }
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = `<span class="fa fa-check"></span> ${escapeHtml(T.fuseShareCopied)}`;
            setTimeout(() => {
              copyBtn.classList.remove('copied');
              copyBtn.innerHTML = `<span class="fa fa-link"></span> ${escapeHtml(T.fuseShareBtn)}`;
            }, 2000);
          } catch (_) { /* silent */ }
        };
        document.getElementById('sh-fusion-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    /* ─────────────── Direct /fusion?t=xxx access ───────────────
       Load both the source shared trip AND the fusion result, then render
       the source as read-only context above the fusion card. */
    async function loadFusion() {
      const params = new URLSearchParams(location.search);
      const fusionToken = params.get('t') || params.get('token');
      const main = document.getElementById('sh-main');
      if (!fusionToken) { main.innerHTML = renderErr(); return; }
      try {
        const r = await fetch('/api/fusion/' + encodeURIComponent(fusionToken));
        if (!r.ok) throw new Error('not found');
        const data = await r.json();
        const src = data.source || {};

        // Synthesize a "shared trip" payload so the existing render() reuses
        // its hero + chips + meta UI for the source context
        const sourcePayload = {
          token: data.source_token,
          dest: src.dest || '',
          title: src.title || '',
          messages: [],   // hide message thread on fusion view to keep focus
          trip_meta: src.trip_meta || {},
          owner_name: src.owner_name || '',
          views: data.views,
          created_at: data.created_at,
        };
        render(sourcePayload);

        // Hide source CTA & feed since the focus is the fusion
        const fuseCta = document.querySelector('.sh-fuse-cta');
        if (fuseCta) fuseCta.style.display = 'none';
        const footerCta = document.querySelector('.sh-footer-cta');
        if (footerCta) footerCta.style.display = 'none';

        renderFusionResult({
          owner_name: src.owner_name || T.assistant,
          guest_name: data.guest_name || T.user,
          ai_response: data.ai_response,
          token: data.token,
          url: '/fusion?t=' + data.token,
        });
        document.title = (T.fuseResultTitle || '')
          .replace('{a}', src.owner_name || '')
          .replace('{b}', data.guest_name || '') + ' · WanderMind';
      } catch (_) {
        main.innerHTML = renderErr();
      }
    }

    /* Route by URL path: /fusion → fusion result view, otherwise → shared */
    if (location.pathname.startsWith('/fusion')) {
      loadFusion();
    } else {
      loadShared();
    }
  </script>
</body>
</html>
