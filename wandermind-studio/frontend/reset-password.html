<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Reset password · WanderMind</title>
  <meta name="description" content="Set a new password for your WanderMind account.">
  <link rel="icon" type="image/png" href="assets/images/logo-mark-256.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    :root {
      --gold: #fcbf1e;
      --gold-dk: #d97706;
      --teal: #0e7c6b;
      --teal-lt: #14b8a6;
      --ink: #1e293b;
      --ink-2: #475569;
      --ink-3: #94a3b8;
      --paper: #ffffff;
      --bg: #fafaf7;
      --bg-2: #f5f3ed;
      --line: #e5e2d8;
      --err: #dc2626;
    }
    body.dark {
      --ink: #f0f0ec;
      --ink-2: #b8b8b0;
      --ink-3: #707068;
      --paper: #1f1f1c;
      --bg: #15150f;
      --bg-2: #2a2a25;
      --line: #3a3a32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* —— Top bar —— */
    .rp-top {
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .rp-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--ink);
      font-size: 17px;
      letter-spacing: .02em;
    }
    .rp-brand img { width: 32px; height: 32px; object-fit: contain; }
    .rp-brand small { font-size: 10px; opacity: .55; letter-spacing: .18em; text-transform: uppercase; font-weight: 400; }
    .rp-theme {
      background: var(--bg-2);
      border: 1px solid var(--line);
      width: 36px; height: 36px;
      border-radius: 18px;
      cursor: pointer;
      color: var(--ink-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .rp-theme:hover { background: var(--line); }

    /* —— Card —— */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 18px;
    }
    .rp-card {
      width: 100%;
      max-width: 440px;
      background: var(--paper);
      border-radius: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 10px 30px rgba(0,0,0,.08);
      padding: 32px 32px 28px;
    }
    .rp-eyebrow {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-dk);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .rp-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .rp-sub {
      font-size: 13.5px;
      color: var(--ink-2);
      margin: 0 0 22px;
      line-height: 1.65;
    }
    .rp-field {
      margin-bottom: 14px;
    }
    .rp-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 6px;
    }
    .rp-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .rp-input:focus { border-color: var(--teal-lt); }
    .rp-msg {
      font-size: 13px;
      margin: 6px 0 14px;
      min-height: 18px;
    }
    .rp-msg.err { color: var(--err); }
    .rp-msg.ok { color: var(--teal); }
    .rp-btn {
      width: 100%;
      padding: 13px 18px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .rp-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(252,191,30,.35); }
    .rp-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
    .rp-foot {
      text-align: center;
      margin-top: 18px;
      font-size: 12.5px;
      color: var(--ink-3);
    }
    .rp-success-icon {
      text-align: center;
      font-size: 56px;
      color: var(--teal);
      margin: 20px 0 12px;
    }
    .rp-spinner { animation: rp-spin 1s linear infinite; }
    @keyframes rp-spin { to { transform: rotate(360deg); } }

    /* —— Mobile —— */
    @media (max-width: 480px) {
      .rp-top { padding: 12px 16px; }
      .rp-brand { font-size: 15px; }
      .rp-brand small { display: none; }
      .rp-card { padding: 26px 22px 22px; border-radius: 14px; }
      .rp-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <header class="rp-top">
    <a href="/" class="rp-brand">
      <img src="assets/images/logo-mark-256.png" alt="WanderMind">
      <span>WanderMind <small>STUDIO</small></span>
    </a>
    <button class="rp-theme" id="rp-theme" title="Toggle theme"><span class="fa fa-moon-o"></span></button>
  </header>

  <main>
    <div class="rp-card" id="rp-card">
      <!-- filled by JS -->
    </div>
  </main>

  <script>
    /* ---------- Minimal i18n ---------- */
    const I18N = {
      zh: { eyebrow:'重置密码', title:'设置新密码', sub:'输入新密码，最少 6 位。', newPw:'新密码', confirm:'再次输入新密码', btn:'更新并登录', sending:'更新中…', errMatch:'两次输入的密码不一致', errShort:'密码至少 6 个字符', errBad:'链接无效或已过期。请重新申请重置链接。', noToken:'缺少有效的重置令牌。', success:'密码已更新 ✓', successSub:'正在跳转到工作台…', goHome:'返回首页' },
      en: { eyebrow:'Reset password', title:'Set a new password', sub:'Choose a strong password — at least 6 characters.', newPw:'New password', confirm:'Confirm new password', btn:'Update & sign in', sending:'Updating…', errMatch:'Passwords do not match', errShort:'Password must be at least 6 characters', errBad:'The link is invalid or has expired. Request a new one.', noToken:'Missing reset token in URL.', success:'Password updated ✓', successSub:'Redirecting to the workspace…', goHome:'Back to home' },
      ja: { eyebrow:'パスワードリセット', title:'新しいパスワードを設定', sub:'6文字以上の強いパスワードを選択。', newPw:'新しいパスワード', confirm:'新しいパスワード（確認）', btn:'更新してログイン', sending:'更新中…', errMatch:'パスワードが一致しません', errShort:'パスワードは6文字以上必要です', errBad:'リンクが無効または期限切れです。再申請してください。', noToken:'URLにトークンがありません。', success:'パスワードを更新しました ✓', successSub:'ワークスペースへリダイレクト中…', goHome:'ホームへ戻る' },
      ko: { eyebrow:'비밀번호 재설정', title:'새 비밀번호 설정', sub:'6자 이상의 강력한 비밀번호 선택.', newPw:'새 비밀번호', confirm:'새 비밀번호 확인', btn:'업데이트하고 로그인', sending:'업데이트 중…', errMatch:'비밀번호가 일치하지 않습니다', errShort:'비밀번호는 최소 6자', errBad:'링크가 유효하지 않거나 만료되었습니다. 다시 요청하세요.', noToken:'URL에 토큰이 없습니다.', success:'비밀번호 업데이트됨 ✓', successSub:'작업 공간으로 이동 중…', goHome:'홈으로' },
      id: { eyebrow:'Reset kata sandi', title:'Atur kata sandi baru', sub:'Pilih kata sandi kuat — minimal 6 karakter.', newPw:'Kata sandi baru', confirm:'Konfirmasi kata sandi', btn:'Update & masuk', sending:'Memperbarui…', errMatch:'Kata sandi tidak cocok', errShort:'Minimal 6 karakter', errBad:'Link tidak valid atau kadaluarsa. Minta yang baru.', noToken:'Token tidak ada di URL.', success:'Kata sandi diperbarui ✓', successSub:'Mengarahkan ke workspace…', goHome:'Kembali ke beranda' }
    };
    const userLang = ((navigator.language||'en').toLowerCase().split('-')[0]);
    const LANG = I18N[userLang] ? userLang : 'en';
    const T = I18N[LANG];
    document.documentElement.lang = LANG;

    /* ---------- Theme ---------- */
    const savedTheme = localStorage.getItem('wm_studio_theme') || 'light';
    if (savedTheme === 'dark') document.body.classList.add('dark');
    document.getElementById('rp-theme').onclick = () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('wm_studio_theme', isDark ? 'dark' : 'light');
      document.querySelector('#rp-theme .fa').className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
    };
    if (savedTheme === 'dark') document.querySelector('#rp-theme .fa').className = 'fa fa-sun-o';

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    /* ---------- Token presence ---------- */
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || params.get('t');
    const card = document.getElementById('rp-card');

    function renderError(msg) {
      card.innerHTML = `
        <div style="text-align:center;padding:8px 0 4px">
          <div style="font-size:48px;color:var(--err);margin-bottom:10px"><span class="fa fa-exclamation-triangle"></span></div>
          <h1 class="rp-title">${escapeHtml(T.errBad)}</h1>
          <p class="rp-sub">${escapeHtml(msg || '')}</p>
          <a href="/" class="rp-btn" style="display:inline-flex;text-decoration:none;width:auto;padding:12px 26px">${escapeHtml(T.goHome)}</a>
        </div>
      `;
    }

    function renderSuccess() {
      card.innerHTML = `
        <div style="text-align:center;padding:8px 0 4px">
          <div class="rp-success-icon"><span class="fa fa-check-circle"></span></div>
          <h1 class="rp-title">${escapeHtml(T.success)}</h1>
          <p class="rp-sub">${escapeHtml(T.successSub)}</p>
        </div>
      `;
    }

    function renderForm() {
      card.innerHTML = `
        <div class="rp-eyebrow"><span class="fa fa-key"></span> &nbsp;${escapeHtml(T.eyebrow)}</div>
        <h1 class="rp-title">${escapeHtml(T.title)}</h1>
        <p class="rp-sub">${escapeHtml(T.sub)}</p>
        <div class="rp-field">
          <label class="rp-label">${escapeHtml(T.newPw)}</label>
          <input type="password" class="rp-input" id="rp-pw1" autocomplete="new-password" minlength="6">
        </div>
        <div class="rp-field">
          <label class="rp-label">${escapeHtml(T.confirm)}</label>
          <input type="password" class="rp-input" id="rp-pw2" autocomplete="new-password" minlength="6">
        </div>
        <div class="rp-msg" id="rp-msg"></div>
        <button class="rp-btn" id="rp-btn"><span class="fa fa-check"></span> ${escapeHtml(T.btn)}</button>
      `;

      const btn = document.getElementById('rp-btn');
      const msg = document.getElementById('rp-msg');
      const pw1 = document.getElementById('rp-pw1');
      const pw2 = document.getElementById('rp-pw2');

      [pw1, pw2].forEach(inp => inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
      }));

      btn.onclick = async () => {
        msg.className = 'rp-msg';
        msg.textContent = '';
        const p1 = pw1.value, p2 = pw2.value;
        if (p1.length < 6) { msg.className = 'rp-msg err'; msg.textContent = T.errShort; return; }
        if (p1 !== p2)     { msg.className = 'rp-msg err'; msg.textContent = T.errMatch; return; }

        btn.disabled = true;
        const oldHtml = btn.innerHTML;
        btn.innerHTML = `<span class="fa fa-spinner rp-spinner"></span> ${escapeHtml(T.sending)}`;
        try {
          const r = await fetch('/api/auth/reset-password', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ token, password: p1 })
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) {
            msg.className = 'rp-msg err';
            msg.textContent = (data && data.detail) || T.errBad;
            btn.disabled = false;
            btn.innerHTML = oldHtml;
            return;
          }
          // Persist the new auth token so workspace recognises the user
          if (data.token) {
            try {
              localStorage.setItem('wm_studio_token', data.token);
              localStorage.setItem('wm_studio_user', JSON.stringify(data.user || {}));
            } catch (_) { /* private mode: ignore */ }
          }
          renderSuccess();
          setTimeout(() => { location.href = '/ai-tool'; }, 1800);
        } catch (e) {
          msg.className = 'rp-msg err';
          msg.textContent = (e && e.message) || T.errBad;
          btn.disabled = false;
          btn.innerHTML = oldHtml;
        }
      };

      pw1.focus();
    }

    if (!token) {
      renderError(T.noToken);
    } else {
      renderForm();
    }
  </script>
</body>
</html>
